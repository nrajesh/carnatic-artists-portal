# Runs on every push to `pre-prod` and on every PR targeting `main`.
# Use this check in GitHub branch protection: require it before merging to `main`.
#
# Add Actions secrets CI_DATABASE_URL + CI_DATABASE_URL_UNPOOLED (Neon) for a clean
# build with real data at SSG time. If omitted, dummy URLs are used (build may log DB errors).

name: CI (pre-prod gate)

on:
  push:
    branches: [pre-prod]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set DATABASE_URL for CI
        env:
          SECRET_POOL: ${{ secrets.CI_DATABASE_URL }}
          SECRET_DIRECT: ${{ secrets.CI_DATABASE_URL_UNPOOLED }}
        run: |
          if [ -n "$SECRET_POOL" ]; then echo "DATABASE_URL=$SECRET_POOL" >> "$GITHUB_ENV"
          else echo "DATABASE_URL=postgresql://ci:ci@127.0.0.1:5432/ci?sslmode=require" >> "$GITHUB_ENV"
          fi
          if [ -n "$SECRET_DIRECT" ]; then echo "DATABASE_URL_UNPOOLED=$SECRET_DIRECT" >> "$GITHUB_ENV"
          else echo "DATABASE_URL_UNPOOLED=postgresql://ci:ci@127.0.0.1:5432/ci?sslmode=require" >> "$GITHUB_ENV"
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm run build
